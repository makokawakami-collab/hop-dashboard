<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>+ホップ 人材ダッシュボード 3期通期</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;font-size:13px;background:#eef0f4;color:#222;overflow:hidden}
.app{display:flex;height:100vh}

/* ── sidebar ── */
.sidebar{width:196px;min-width:196px;background:#1c2135;color:#8892a4;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid #2d3548}
.sidebar-logo .brand{color:#fff;font-size:17px;font-weight:700;letter-spacing:.5px}
.sidebar-logo .sub{color:#4e5a6e;font-size:10px;letter-spacing:1.5px;margin-top:3px}
.nav-section{font-size:10px;font-weight:700;letter-spacing:1px;color:#4e5a6e;padding:14px 16px 5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;color:#8892a4;cursor:pointer;border-left:3px solid transparent;transition:all .15s;font-size:13px}
.nav-item:hover{color:#c5cad6;background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.07);border-left-color:#e87040}

/* ── main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #e0e2e8;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.topbar-title{font-size:17px;font-weight:700;color:#1a1a2e}
.badge{background:#6B2D1F;color:#fff;font-size:11px;padding:2px 9px;border-radius:10px;white-space:nowrap}
.topbar-info{display:flex;gap:8px;margin-left:auto;font-size:12px;color:#6b7280;flex-wrap:wrap}
.topbar-info span{background:#f3f4f6;padding:3px 10px;border-radius:4px;white-space:nowrap}
.topbar-info span.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.topbar-info span.warn{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
.upload-btn{border:1px solid #d1d5db;border-radius:6px;padding:5px 13px;font-size:12px;cursor:pointer;color:#374151;background:#f9fafb;font-family:inherit;white-space:nowrap;transition:all .15s}
.upload-btn:hover{background:#f3f4f6}
.upload-btn.loaded{border-color:#16a34a;background:#f0fdf4;color:#15803d}

.page-wrap{flex:1;overflow:auto;padding:14px 18px}
.page{display:none}
.page.active{display:block}

/* ── view toggle ── */
.view-toggle{display:flex;gap:4px;margin-bottom:11px}
.view-btn{padding:6px 16px;border:1px solid #d1d5db;background:#fff;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;color:#374151;transition:all .15s}
.view-btn:hover{background:#f9fafb}
.view-btn.active{background:#6B2D1F;color:#fff;border-color:#6B2D1F}

/* ── office tabs ── */
.office-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px}
.office-tab{padding:5px 13px;border:1px solid #d1d5db;background:#fff;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;color:#374151;transition:all .15s}
.office-tab:hover{background:#f9fafb}
.office-tab.active{background:#6B2D1F;color:#fff;border-color:#6B2D1F}

/* ── cost input ── */
.cost-box{background:#fff;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:11px;overflow:hidden}
.cost-toggle{padding:9px 16px;cursor:pointer;font-size:13px;color:#374151;display:flex;align-items:center;gap:6px;user-select:none;background:#fafafa;border-bottom:1px solid transparent}
.cost-toggle:hover{background:#f3f4f6}
.cost-toggle.open{border-bottom-color:#e5e7eb}
.cost-body{display:none;padding:12px 16px 14px;overflow-x:auto}
.cost-body.open{display:block}
.cost-tbl{border-collapse:collapse;font-size:11px;white-space:nowrap}
.cost-tbl th{background:#f9fafb;padding:4px 8px;border:1px solid #e5e7eb;font-weight:600;text-align:center;color:#374151}
.cost-tbl td{border:1px solid #e5e7eb;padding:2px 3px;background:#fff}
.cost-tbl td:first-child{padding:3px 8px;font-weight:500;background:#fafafa;text-align:center}
.cost-tbl input{border:none;width:76px;padding:2px 4px;font-size:11px;font-family:inherit;text-align:right;outline:none;color:#222}
.cost-tbl input:focus{background:#fffbf5;outline:1px solid #8B4513;border-radius:2px}

/* ── data table ── */
.tbl-wrap{overflow-x:auto;background:#fff;border:1px solid #e0e2e8;border-radius:8px}
.dtbl{border-collapse:collapse;font-size:12px;white-space:nowrap}
.dtbl th,.dtbl td{border:1px solid #d1d5db;padding:4px 8px;text-align:center}
.dtbl thead th{background:#6B2D1F;color:#fff;font-weight:700;position:sticky;top:0;z-index:10}
.dtbl thead th.th-total{background:#4a1e11}
.dtbl thead th.th-label{text-align:left;min-width:130px;position:sticky;left:0;z-index:20}
.dtbl td.td-label{text-align:left;font-weight:500;background:#fafafa;white-space:nowrap;position:sticky;left:0;z-index:5;border-right:2px solid #d1d5db}
.dtbl td.td-sub{text-align:left;color:#6b7280;font-size:11px;padding-left:18px;background:#fafafa;position:sticky;left:0;z-index:5;border-right:2px solid #d1d5db}
.dtbl td.td-total{background:#fff8f3;font-weight:600}
.dtbl td.td-total.td-label{background:#fff0e8;font-weight:700;border-right:2px solid #c9a88a}
.dtbl td.rate{font-size:11px;color:#6b7280}
.dtbl td.rate-bad{font-size:11px;color:#dc2626;font-weight:700}
.dtbl td.rate-ok{font-size:11px;color:#6b7280}

/* section rows */
.dtbl tr.sec-main td{background:#6B2D1F;color:#fff;font-weight:700}
.dtbl tr.sec-attr td{background:#1e3a5f;color:#fff;font-weight:700}
.dtbl tr.sec-funnel td{background:#7c4700;color:#fff;font-weight:700}
.dtbl tr.sec-unit td{background:#1f3a1f;color:#fff;font-weight:700}
.dtbl tr.highlight td.td-label,.dtbl tr.highlight td.td-sub{background:#fffbeb}
.dtbl tr.highlight td{background:rgba(255,251,235,.45)}
.dtbl tr.highlight td.td-total{background:#fff3c0}
.dtbl td.empty{color:#d1d5db}

/* star rank rows */
.dtbl tr.rank-row td.td-label{padding-left:28px;font-weight:400;font-size:11px}

/* ── MCG missing ── */
.missing-box{background:#fff;border:1px solid #fca5a5;border-radius:8px;margin-top:11px}
.missing-summary{padding:9px 16px;cursor:pointer;color:#dc2626;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.missing-inner{padding:0 16px 12px;overflow-x:auto}
.missing-tbl{font-size:11px;border-collapse:collapse;width:100%}
.missing-tbl th{background:#fef2f2;padding:4px 10px;border:1px solid #fca5a5;text-align:left;font-weight:600}
.missing-tbl td{padding:4px 10px;border:1px solid #fecaca}

/* ── empty state ── */
.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.empty-state small{font-size:12px;color:#d1d5db}

/* ── period info bar ── */
.period-bar{background:#fffbf5;border:1px solid #f0d9c8;border-radius:8px;padding:8px 16px;margin-bottom:11px;font-size:12px;color:#7c4700;display:flex;align-items:center;gap:10px}
.period-bar strong{color:#6B2D1F}
</style>

/* ═══════════════════════════════
   CONSTANTS
═══════════════════════════════ */
const FISCAL_MONTHS = [
  {year:2025,month:5,label:'5月'},{year:2025,month:6,label:'6月'},
  {year:2025,month:7,label:'7月'},{year:2025,month:8,label:'8月'},
  {year:2025,month:9,label:'9月'},{year:2025,month:10,label:'10月'},
  {year:2025,month:11,label:'11月'},{year:2025,month:12,label:'12月'},
  {year:2026,month:1,label:'1月'},{year:2026,month:2,label:'2月'},
  {year:2026,month:3,label:'3月'},{year:2026,month:4,label:'4月'},
];

const OFFICES = ['青森','盛岡','仙台','千葉','横浜','新宿','新潟','金沢','名古屋','京都','梅田','神戸','福岡','鹿児島'];

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let integratedRows = [];
let mcgRows = [];
let mcgByPhone = new Map();
let costData = {}; // key: "office_YYYY-MM" -> number

let currentOffice = '全オフィス';
let currentView = 'office';

/* ═══════════════════════════════
   ENCODING & CSV PARSE
═══════════════════════════════ */
function detectAndDecode(buf) {
  const bytes = new Uint8Array(buf);
  // Check for UTF-8 BOM
  const hasBOM = bytes[0]===0xEF && bytes[1]===0xBB && bytes[2]===0xBF;
  if(hasBOM) {
    return new TextDecoder('utf-8').decode(buf.slice(3));
  }
  // Try UTF-8 strict
  try {
    const text = new TextDecoder('utf-8', {fatal:true}).decode(buf);
    return text;
  } catch(e) {}
  // Fall back to Shift-JIS
  try {
    return new TextDecoder('shift_jis').decode(buf);
  } catch(e) {}
  return new TextDecoder('utf-8', {fatal:false}).decode(buf);
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  const n = text.length;
  while(i < n) {
    const row = [];
    while(i < n) {
      let field = '';
      if(text[i] === '"') {
        i++;
        while(i < n) {
          if(text[i] === '"') {
            i++;
            if(text[i] === '"') { field += '"'; i++; }
            else break;
          } else {
            field += text[i++];
          }
        }
      } else {
        while(i < n && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') {
          field += text[i++];
        }
      }
      row.push(field.trim());
      if(i < n && text[i] === ',') { i++; continue; }
      break;
    }
    if(i < n && text[i] === '\r') i++;
    if(i < n && text[i] === '\n') i++;
    if(row.length > 0 && !(row.length === 1 && row[0] === '')) rows.push(row);
  }
  return rows;
}

function csvToObjects(text) {
  const rows = parseCSV(text);
  if(rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h,i) => { obj[h] = r[i] || ''; });
    return obj;
  });
}

/* ═══════════════════════════════
   UPLOAD HANDLERS
═══════════════════════════════ */
function triggerUpload(type) {
  document.getElementById('inp-' + type).click();
}

function loadCSV(type, input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = detectAndDecode(e.target.result);
    const objs = csvToObjects(text);
    if(type === 'integrated') {
      integratedRows = objs;
      detectIntegratedCols(objs);  // ← 列名を自動検出
      const btn = document.getElementById('btn-integrated');
      btn.textContent = `✅ 統合ツール (${objs.length}行)`;
      btn.classList.add('loaded');
      document.getElementById('info-integrated').textContent = `統合ツール: ${objs.length}行`;
      document.getElementById('info-integrated').className = 'ok';
    } else {
      mcgRows = objs;
      buildMCGIndex();
      const btn = document.getElementById('btn-mcg');
      btn.textContent = `✅ MCG (${objs.length}行)`;
      btn.classList.add('loaded');
      document.getElementById('info-mcg').textContent = `MCG: ${objs.length}行`;
      document.getElementById('info-mcg').className = 'ok';
    }
    if(integratedRows.length && mcgRows.length) {
      const matched = integratedRows.filter(r => {
        const p = normalizePhone(r['連絡先TEL'] || r['電話番号'] || '');
        return p && mcgByPhone.has(p);
      }).length;
      const info = document.getElementById('info-match');
      info.style.display = '';
      info.textContent = `マッチ: ${matched}/${integratedRows.length}`;
      info.className = matched > integratedRows.length * 0.7 ? 'ok' : 'warn';
    }
    render();
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

/* ═══════════════════════════════
   COLUMN NAME DETECTION
═══════════════════════════════ */
// 統合ツールCSVの実際の列名を格納
let COL = {
  date: '応募日',
  name: '氏名（漢字）',
  tel: '連絡先TEL',
  office: '対応オフィス',
};

function detectIntegratedCols(rows) {
  if(!rows.length) return;
  const headers = Object.keys(rows[0]);

  // 応募日：カッコ付きにも対応
  const dateCol = headers.find(h => h.includes('応募日')) || headers[0];
  // TEL
  const telCol = headers.find(h => /連絡先TEL|電話番号|tel/i.test(h)) || '';
  // オフィス：拠点・対応オフィス・所属など
  const offCol = headers.find(h => /拠点|対応オフィス|所属|オフィス/.test(h)) || '';

  COL.date = dateCol;
  COL.tel = telCol;
  COL.office = offCol;

  console.log('[統合ツール] 検出列:', {date:dateCol, tel:telCol, office:offCol});
  console.log('[統合ツール] サンプル応募日:', rows.slice(0,3).map(r=>r[dateCol]));
  console.log('[統合ツール] サンプル拠点:', rows.slice(0,3).map(r=>r[offCol]));
}

// 拠点名正規化：「名古屋オフィス」→「名古屋」
function normalizeOffice(s) {
  return String(s||'').replace(/オフィス$/, '').trim();
}

function normalizePhone(p) {
  return String(p||'').replace(/[^0-9]/g,'').replace(/^0+/,'');
}

function buildMCGIndex() {
  mcgByPhone.clear();
  // MCGの電話番号列を柔軟検出
  const headers = mcgRows.length ? Object.keys(mcgRows[0]) : [];
  const telCol = headers.find(h => /電話番号|tel|phone/i.test(h)) || '電話番号';
  for(const row of mcgRows) {
    const p = normalizePhone(row[telCol] || row['電話番号'] || '');
    if(!p) continue;
    if(!mcgByPhone.has(p)) mcgByPhone.set(p,[]);
    mcgByPhone.get(p).push(row);
  }
}

function parseYM(s) {
  if(!s) return null;
  const str = String(s).trim().replace(/^\uFEFF/,'');
  // 対応: 2025/5/1, 2025-05-01, 2025年5月, 2025/05/01 10:00, 2025.05.01
  const m = str.match(/(\d{4})[\/\-\.年](\d{1,2})/);
  if(!m) return null;
  return {year:+m[1], month:+m[2]};
}

function isInFY3(s) {
  const ym = parseYM(s);
  if(!ym) return false;
  return (ym.year===2025 && ym.month>=5) || (ym.year===2026 && ym.month<=4);
}

function ymKey(y,m) { return `${y}-${String(m).padStart(2,'0')}`; }

function pct(a,b) {
  if(!b) return '－';
  return (a/b*100).toFixed(1)+'%';
}

function yen(v) {
  if(!v || isNaN(v) || v<=0) return '－';
  return '¥' + Math.round(v).toLocaleString();
}

function rankLabel(rank) {
  const r = String(rank||'').trim().toUpperCase();
  if(r === 'A') return 'A';
  if(r === 'B') return 'B';
  if(r === 'C') return 'C';
  // 旧フォーマット対応
  if(r.startsWith('A') || r.includes('★★★★')) return 'A';
  if(r.startsWith('B') || r.includes('★★★')) return 'B';
  if(r.startsWith('C') || r.includes('★★')) return 'C';
  return '';
}

/* ═══════════════════════════════
   COST DATA
═══════════════════════════════ */
function costKey(office, ym) { return `${office}__${ym.year}-${String(ym.month).padStart(2,'0')}`; }

function getCost(office, ym) {
  const k = costKey(office, ym);
  const v = parseFloat((costData[k]||'').toString().replace(/,/g,''));
  return isNaN(v) ? 0 : v;
}

function setCost(office, ym, val) {
  const k = costKey(office, ym);
  costData[k] = val;
  try { localStorage.setItem('hop3ki_cost', JSON.stringify(costData)); } catch(e){}
}

function loadCostFromStorage() {
  try {
    const s = localStorage.getItem('hop3ki_cost');
    if(s) costData = JSON.parse(s);
  } catch(e){}
}

/* ═══════════════════════════════
   STATS COMPUTATION
   月次版と同じロジック：
   - 総応募のみ統合ツールCSV由来
   - 有効応募以降はMCGを「応募日（2列目=応募日.1）」で月フィルタして直接集計
   - CSVパーサーが同名列を後勝ちで上書きするため
     mcg['接触ステータス']=数値版, mcg['福祉資格']=数値版, mcg['介護経験']=数値版
═══════════════════════════════ */

function flag1(val) {
  return parseFloat(String(val ?? '').trim()) === 1;
}

// MCGを年月・オフィスでフィルタして集計
let _embeddedMatrix = null; // 共有HTML用：埋め込み済み集計データ

function computeStatsMCG(year, month, office) {
  // 共有HTML：埋め込みデータから返す
  if(_embeddedMatrix) {
    const s = emptyStats();
    const offices = (office && office !== '全オフィス') ? [office] : OFFICES;
    offices.forEach(off => {
      if(!_embeddedMatrix[off]) return;
      const months = (year !== null && month !== null)
        ? [`${year}-${month}`]
        : FISCAL_MONTHS.map(ym => `${ym.year}-${ym.month}`);
      months.forEach(key => {
        const ms = _embeddedMatrix[off][key];
        if(!ms) return;
        for(const k of Object.keys(s)) {
          if(k === 'cost') continue;
          s[k] = (s[k]||0) + (ms[k]||0);
        }
      });
    });
    return s;
  }
  // 総応募は統合ツールから別途計算
  const s = emptyStats();

  const seenDedup = new Set(); // office|||phone でユニーク化

  for(const mcg of mcgRows) {
    // 応募日フィルタ（MCGの応募日 = CSV内で後ろの「応募日」列）
    const dateRaw = mcg['応募日'] || '';
    const ym = parseYM(String(dateRaw));
    if(!ym) continue;
    if(year !== null && ym.year !== year) continue;
    if(month !== null && ym.month !== month) continue;

    // オフィスフィルタ
    const off = String(mcg['所属'] || '').trim();
    if(office && office !== '全オフィス' && off !== office) continue;
    if(!OFFICES.includes(off)) continue;

    // 有効応募フラグ
    if(!flag1(mcg['有効応募'])) continue;

    // 電話番号×オフィスでユニーク化
    const phone = normalizePhone(String(mcg['電話番号'] || ''));
    const dedupKey = off + '|||' + phone;
    if(phone) {
      if(seenDedup.has(dedupKey)) continue;
      seenDedup.add(dedupKey);
    }

    s.valid++;

    // 各フラグ（後勝ちの同名列 = 数値0/1）
    const isContacted = flag1(mcg['接触ステータス']);
    const qual        = flag1(mcg['福祉資格']);
    const exp         = flag1(mcg['介護経験']);
    const is3days     = flag1(mcg['3日以上']);
    const is60under   = flag1(mcg['60判定']);
    const hasNight    = String(mcg['夜勤専従'] ?? '').includes('YA');

    if(isContacted) s.contacted++;
    if(qual) s.qualified++;
    if(exp) s.experienced++;
    if(!qual && !exp) s.neither++;
    if(is3days) s.lt++;
    if(is60under) s.under60++;
    if(hasNight) s.nightShift++;

    // 人選
    if(isContacted) {
      s.selected++;
      const rk = rankLabel(mcg['人選']);
      if(rk==='A') s.rankA++;
      else if(rk==='B') s.rankB++;
      else if(rk==='C') s.rankC++;
    }

    // ファネル：応募月と同じ月の日付のみカウント（当月応募→当月完了）
    const rank = rankLabel(mcg['人選']);
    function addFunnel(dateField, nKey, aKey, bKey, cKey) {
      const d = String(mcg[dateField] ?? '').trim();
      if(!d || d === 'nan') return;
      // 応募月と同じ年月かチェック
      const dym = parseYM(d);
      if(!dym || dym.year !== ym.year || dym.month !== ym.month) return;
      s[nKey]++;
      if(rank==='A') s[aKey]++;
      else if(rank==='B') s[bKey]++;
      else if(rank==='C') s[cKey]++;
    }
    addFunnel('設定日','setN','setA','setB','setC');
    addFunnel('実施日','implN','implA','implB','implC');
    addFunnel('決定日','decidedN','decidedA','decidedB','decidedC');
    addFunnel('開始日','startedN','startedA','startedB','startedC');
  }

  return s;
}

function emptyStats() {
  return {
    total:0, valid:0, contacted:0,
    qualified:0, experienced:0, neither:0,
    lt:0, under60:0, nightShift:0,
    selected:0, rankA:0, rankB:0, rankC:0,
    setN:0, setA:0, setB:0, setC:0,
    implN:0, implA:0, implB:0, implC:0,
    decidedN:0, decidedA:0, decidedB:0, decidedC:0,
    startedN:0, startedA:0, startedB:0, startedC:0,
    cost:0,
  };
}

// 総応募を統合ツールから計算
function countTotal(year, month, office) {
  // 共有HTML：埋め込みデータから返す
  if(_embeddedMatrix) {
    const offices = (office && office !== '全オフィス') ? [office] : OFFICES;
    let total = 0;
    offices.forEach(off => {
      if(!_embeddedMatrix[off]) return;
      const months = (year !== null && month !== null)
        ? [`${year}-${month}`]
        : FISCAL_MONTHS.map(ym => `${ym.year}-${ym.month}`);
      months.forEach(key => {
        total += (_embeddedMatrix[off][key]||{}).total || 0;
      });
    });
    return total;
  }
  return integratedRows.filter(r => {
    const dateVal = r[COL.date] || r['応募日'] || r['（応募内容）応募日'] || '';
    const ym = parseYM(String(dateVal));
    if(!ym) return false;
    if(year !== null && ym.year !== year) return false;
    if(month !== null && ym.month !== month) return false;
    const off = normalizeOffice(r[COL.office] || r['拠点'] || r['対応オフィス'] || '');
    if(office && office !== '全オフィス') return off === office;
    return OFFICES.includes(off);
  }).length;
}

/* ═══════════════════════════════
   GET ROWS for office × month
═══════════════════════════════ */
function getRows(office, ym) {
  return integratedRows.filter(r => {
    const dateVal = r[COL.date] || r['応募日'] || '';
    if(!isInFY3(dateVal)) return false;
    if(ym) {
      const d = parseYM(dateVal);
      if(!d || d.year!==ym.year || d.month!==ym.month) return false;
    }
    const off = normalizeOffice(r[COL.office] || r['対応オフィス'] || r['所属'] || '');
    if(office && office !== '全オフィス') {
      return off === office;
    }
    return true;
  });
}

/* ═══════════════════════════════
   BUILD STATS MATRIX: office × months
═══════════════════════════════ */
function buildOfficeMonthMatrix(office) {
  const monthStats = FISCAL_MONTHS.map(ym => {
    const s = computeStatsMCG(ym.year, ym.month, office);
    s.total = countTotal(ym.year, ym.month, office);
    s.cost = (office === '全オフィス')
      ? OFFICES.reduce((acc,o)=>acc+getCost(o,ym),0)
      : getCost(office, ym);
    return s;
  });

  const total = sumStats(monthStats);
  total.cost = (office === '全オフィス')
    ? OFFICES.reduce((acc,o)=>acc+FISCAL_MONTHS.reduce((a,ym)=>a+getCost(o,ym),0),0)
    : FISCAL_MONTHS.reduce((acc,ym)=>acc+getCost(office,ym),0);

  return {monthStats, total};
}

function sumStats(arr) {
  const s = emptyStats();
  for(const x of arr) {
    for(const k of Object.keys(s)) {
      s[k] = (s[k]||0) + (x[k]||0);
    }
  }
  return s;
}

/* ═══════════════════════════════
   BUILD ALL-OFFICE MATRIX (通期合計 per office)
═══════════════════════════════ */
function buildAllOfficeMatrix() {
  return OFFICES.map(off => {
    const s = computeStatsMCG(null, null, off);
    s.total = countTotal(null, null, off);
    s.cost = FISCAL_MONTHS.reduce((acc,ym)=>acc+getCost(off,ym),0);
    return {office:off, stats:s};
  });
}

/* ═══════════════════════════════
   RENDER TABLE: office×months
═══════════════════════════════ */
function renderOfficeTable(office) {
  if(!_embeddedMatrix && (!integratedRows.length || !mcgRows.length)) {
    return `<div class="empty-state"><div class="icon">📂</div><p>統合ツールCSVとMCG CSVを読み込んでください</p></div>`;
  }

  const {monthStats, total} = buildOfficeMonthMatrix(office);
  const cols = FISCAL_MONTHS;

  let h = `<div class="tbl-wrap"><table class="dtbl"><thead><tr>`;
  h += `<th class="th-label" style="min-width:150px">${office}（2025年5月〜2026年4月）</th>`;
  cols.forEach(c=>{ h += `<th>${c.label}</th>`; });
  h += `<th class="th-total">通期合計</th></tr></thead><tbody>`;

  function row(cls, label, vals, totalVal, extraClass='') {
    let r = `<tr class="${cls}">`;
    const isSec = cls.includes('sec-');
    if(isSec) {
      r += `<td colspan="${cols.length+2}">${label}</td>`;
    } else {
      const labelCls = cls.includes('sub')||cls.includes('rank') ? 'td-sub' : 'td-label';
      r += `<td class="${labelCls} ${extraClass}">${label}</td>`;
      vals.forEach((v,i) => {
        r += `<td class="${extraClass}">${v===null||v===undefined?'<span class="empty">－</span>':v}</td>`;
      });
      r += `<td class="td-total ${extraClass}">${totalVal===null||totalVal===undefined?'<span class="empty">－</span>':totalVal}</td>`;
    }
    r += `</tr>`;
    return r;
  }

  function numRow(cls, label, fn, hl='') {
    return row(cls, label, monthStats.map(s=>fn(s)||'0'), fn(total)||'0', hl);
  }

  function rateRow(cls, label, numFn, denFn, threshold=0, goodBelow=true) {
    const cells = monthStats.map(s => {
      const n=numFn(s), d=denFn(s);
      if(!d) return '<span class="empty">－</span>';
      const p = n/d*100;
      const bad = goodBelow ? p < threshold : p > threshold;
      return `<span class="${bad?'rate-bad':'rate-ok'}">${p.toFixed(1)}%</span>`;
    });
    const tn=numFn(total),td=denFn(total);
    const tp = td ? (tn/td*100).toFixed(1)+'%' : '－';
    const tbad = td && goodBelow ? tn/td*100 < threshold : false;
    return row(cls, label, cells, `<span class="${tbad?'rate-bad':'rate-ok'}">${tp}</span>`);
  }

  function yenRow(cls, label, costFn, cntFn) {
    const cells = monthStats.map(s => {
      const cost=costFn(s), cnt=cntFn(s);
      return (cost>0&&cnt>0) ? '¥'+Math.round(cost/cnt).toLocaleString() : '<span class="empty">－</span>';
    });
    const tc=costFn(total),tn=cntFn(total);
    return row(cls, label, cells, (tc>0&&tn>0)?'¥'+Math.round(tc/tn).toLocaleString():'－');
  }

  // ── Section: 集客・応募
  h += row('sec-main','',null,null);

  h += numRow('','集客費用', s => s.cost>0?'¥'+s.cost.toLocaleString():'－');
  h += numRow('','総応募', s => s.total);
  h += numRow('highlight','有効応募', s => s.valid);
  h += rateRow('','（有効率）70%未満↓', s=>s.valid, s=>s.total, 70, true);
  h += numRow('','接触数', s => s.contacted);
  h += rateRow('','（接触率）90%未満↓', s=>s.contacted, s=>s.valid, 90, true);

  // ── Section: 属性
  h += row('sec-attr','📋 有効応募 属性内訳',null,null);
  h += numRow('highlight','★資格アリ', s=>s.qualified);
  h += rateRow('','（割合）', s=>s.qualified, s=>s.valid);
  h += numRow('highlight','★経験アリ', s=>s.experienced);
  h += rateRow('','（割合）', s=>s.experienced, s=>s.valid);
  h += numRow('','なしなし', s=>s.neither);
  h += rateRow('','（割合）', s=>s.neither, s=>s.valid);
  h += numRow('highlight','★週3日以上 (LT)', s=>s.lt);
  h += rateRow('','（割合）', s=>s.lt, s=>s.valid);
  h += numRow('','週2日以下', s=>s.valid-s.lt);
  h += rateRow('','（割合）', s=>s.valid-s.lt, s=>s.valid);
  h += numRow('','60歳以上', s=>s.valid-s.under60);
  h += rateRow('','（割合）', s=>s.valid-s.under60, s=>s.valid);
  h += numRow('highlight','★60歳未満', s=>s.under60);
  h += rateRow('','（割合）', s=>s.under60, s=>s.valid);
  h += numRow('','夜勤専従希望', s=>s.nightShift);
  h += rateRow('','（割合）', s=>s.nightShift, s=>s.valid);

  // ── Section: ファネル
  h += row('sec-funnel','🎯 人選・ファネル',null,null);
  h += numRow('','人選対象数', s=>s.selected);
  h += rateRow('','（有効応募からの割合）', s=>s.selected, s=>s.valid);
  h += numRow('rank-row','★★★★', s=>s.rankA);
  h += numRow('rank-row','★★★☆', s=>s.rankB);
  h += numRow('rank-row','★★☆☆', s=>s.rankC);

  h += numRow('highlight','設定数', s=>s.setN);
  h += rateRow('','（設定率 / 有効応募比）', s=>s.setN, s=>s.valid);
  h += numRow('rank-row','★★★★', s=>s.setA);
  h += numRow('rank-row','★★★☆', s=>s.setB);
  h += numRow('rank-row','★★☆☆', s=>s.setC);

  h += numRow('','実施数', s=>s.implN);
  h += rateRow('','（実施率 / 設定比）', s=>s.implN, s=>s.setN);
  h += numRow('rank-row','★★★★', s=>s.implA);
  h += numRow('rank-row','★★★☆', s=>s.implB);
  h += numRow('rank-row','★★☆☆', s=>s.implC);

  h += numRow('','決定数', s=>s.decidedN);
  h += rateRow('','（決定率 / 実施比）', s=>s.decidedN, s=>s.implN);
  h += numRow('rank-row','★★★★', s=>s.decidedA);
  h += numRow('rank-row','★★★☆', s=>s.decidedB);
  h += numRow('rank-row','★★☆☆', s=>s.decidedC);

  h += numRow('highlight','開始数', s=>s.startedN);
  h += rateRow('','（開始率 / 人選対象比）', s=>s.startedN, s=>s.selected);
  h += numRow('rank-row','★★★★', s=>s.startedA);
  h += numRow('rank-row','★★★☆', s=>s.startedB);
  h += numRow('rank-row','★★☆☆', s=>s.startedC);

  // ── Section: 単価
  h += row('sec-unit','💰 単価一覧（集客費用÷件数）',null,null);
  h += yenRow('','総応募 単価', s=>s.cost, s=>s.total);
  h += yenRow('','有効応募 単価', s=>s.cost, s=>s.valid);
  h += yenRow('','人選対象 単価', s=>s.cost, s=>s.selected);
  h += yenRow('','設定 単価', s=>s.cost, s=>s.setN);
  h += yenRow('','実施 単価', s=>s.cost, s=>s.implN);
  h += yenRow('','決定 単価', s=>s.cost, s=>s.decidedN);
  h += yenRow('highlight','開始 単価', s=>s.cost, s=>s.startedN);

  h += `</tbody></table></div>`;

  return h;
}

/* ═══════════════════════════════
   RENDER TABLE: all offices × 通期
═══════════════════════════════ */
function renderAllOfficeTable() {
  if(!_embeddedMatrix && (!integratedRows.length || !mcgRows.length)) {
    return `<div class="empty-state"><div class="icon">📂</div><p>統合ツールCSVとMCG CSVを読み込んでください</p></div>`;
  }

  const data = buildAllOfficeMatrix();
  const allTotal = sumStats(data.map(d=>d.stats));
  allTotal.cost = OFFICES.reduce((acc,off)=>acc+FISCAL_MONTHS.reduce((a,ym)=>a+getCost(off,ym),0),0);

  let h = `<div class="tbl-wrap"><table class="dtbl"><thead><tr>`;
  h += `<th class="th-label" style="min-width:150px">3期通期（全12ヶ月）</th>`;
  data.forEach(d=>{ h += `<th>${d.office}</th>`; });
  h += `<th class="th-total">合計</th></tr></thead><tbody>`;

  function row(cls, label, vals, totalVal) {
    let r = `<tr class="${cls}">`;
    const isSec = cls.includes('sec-');
    if(isSec) {
      r += `<td colspan="${data.length+2}">${label}</td>`;
    } else {
      const lc = cls.includes('rank') ? 'td-sub' : 'td-label';
      r += `<td class="${lc}">${label}</td>`;
      vals.forEach(v => {
        r += `<td>${v===null||v===undefined?'<span class="empty">－</span>':v}</td>`;
      });
      r += `<td class="td-total">${totalVal===null||totalVal===undefined?'<span class="empty">－</span>':totalVal}</td>`;
    }
    r += `</tr>`;
    return r;
  }

  function numRow(cls, label, fn) {
    return row(cls, label, data.map(d=>fn(d.stats)), fn(allTotal));
  }

  function rateRow(cls, label, nFn, dFn, threshold=0, goodBelow=true) {
    const cells = data.map(d => {
      const n=nFn(d.stats), dn=dFn(d.stats);
      if(!dn) return '<span class="empty">－</span>';
      const p=n/dn*100;
      const bad = goodBelow ? p<threshold : false;
      return `<span class="${bad?'rate-bad':'rate-ok'}">${p.toFixed(1)}%</span>`;
    });
    const tn=nFn(allTotal),td=dFn(allTotal);
    const tp=td?(tn/td*100).toFixed(1)+'%':'－';
    return row(cls, label, cells, tp);
  }

  function yenRow(cls, label, costFn, cntFn) {
    const cells = data.map(d => {
      const c=costFn(d.stats),n=cntFn(d.stats);
      return (c>0&&n>0)?'¥'+Math.round(c/n).toLocaleString():'<span class="empty">－</span>';
    });
    const tc=costFn(allTotal),tn=cntFn(allTotal);
    return row(cls, label, cells, (tc>0&&tn>0)?'¥'+Math.round(tc/tn).toLocaleString():'－');
  }

  h += row('sec-main','',null,null);
  h += numRow('','集客費用', s=>s.cost>0?'¥'+s.cost.toLocaleString():'－');
  h += numRow('','総応募', s=>s.total);
  h += numRow('highlight','有効応募', s=>s.valid);
  h += rateRow('','（有効率）70%未満↓', s=>s.valid, s=>s.total, 70, true);
  h += numRow('','接触数', s=>s.contacted);
  h += rateRow('','（接触率）90%未満↓', s=>s.contacted, s=>s.valid, 90, true);

  h += row('sec-attr','📋 有効応募 属性内訳',null,null);
  h += numRow('highlight','★資格アリ', s=>s.qualified);
  h += rateRow('','（割合）', s=>s.qualified, s=>s.valid);
  h += numRow('highlight','★経験アリ', s=>s.experienced);
  h += rateRow('','（割合）', s=>s.experienced, s=>s.valid);
  h += numRow('','なしなし', s=>s.neither);
  h += rateRow('','（割合）', s=>s.neither, s=>s.valid);
  h += numRow('highlight','★週3日以上 (LT)', s=>s.lt);
  h += rateRow('','（割合）', s=>s.lt, s=>s.valid);
  h += numRow('','週2日以下', s=>s.valid-s.lt);
  h += rateRow('','（割合）', s=>s.valid-s.lt, s=>s.valid);
  h += numRow('','60歳以上', s=>s.valid-s.under60);
  h += rateRow('','（割合）', s=>s.valid-s.under60, s=>s.valid);
  h += numRow('highlight','★60歳未満', s=>s.under60);
  h += rateRow('','（割合）', s=>s.under60, s=>s.valid);
  h += numRow('','夜勤専従希望', s=>s.nightShift);
  h += rateRow('','（割合）', s=>s.nightShift, s=>s.valid);

  h += row('sec-funnel','🎯 人選・ファネル',null,null);
  h += numRow('','人選対象数', s=>s.selected);
  h += rateRow('','（有効応募からの割合）', s=>s.selected, s=>s.valid);
  h += numRow('rank-row','★★★★', s=>s.rankA);
  h += numRow('rank-row','★★★☆', s=>s.rankB);
  h += numRow('rank-row','★★☆☆', s=>s.rankC);
  h += numRow('highlight','設定数', s=>s.setN);
  h += rateRow('','（設定率 / 有効応募比）', s=>s.setN, s=>s.valid);
  h += numRow('rank-row','★★★★', s=>s.setA);
  h += numRow('rank-row','★★★☆', s=>s.setB);
  h += numRow('rank-row','★★☆☆', s=>s.setC);
  h += numRow('','実施数', s=>s.implN);
  h += rateRow('','（実施率 / 設定比）', s=>s.implN, s=>s.setN);
  h += numRow('','決定数', s=>s.decidedN);
  h += rateRow('','（決定率 / 実施比）', s=>s.decidedN, s=>s.implN);
  h += numRow('highlight','開始数', s=>s.startedN);
  h += rateRow('','（開始率 / 人選対象比）', s=>s.startedN, s=>s.selected);

  h += row('sec-unit','💰 単価一覧',null,null);
  h += yenRow('','総応募 単価', s=>s.cost, s=>s.total);
  h += yenRow('','有効応募 単価', s=>s.cost, s=>s.valid);
  h += yenRow('','設定 単価', s=>s.cost, s=>s.setN);
  h += yenRow('highlight','開始 単価', s=>s.cost, s=>s.startedN);

  h += `</tbody></table></div>`;
  return h;
}

/* ═══════════════════════════════
   COST INPUT TABLE
═══════════════════════════════ */
function renderCostInput(office) {
  let h = `<div class="cost-box">`;
  h += `<div class="cost-toggle" id="cost-toggle-${office}" onclick="toggleCost('${office}')">▶ 集客費用を入力する（クリックで展開）</div>`;
  h += `<div class="cost-body" id="cost-body-${office}">`;
  h += `<div class="cost-tbl-wrap"><table class="cost-tbl">`;
  h += `<tr><th>オフィス / 月</th>`;
  FISCAL_MONTHS.forEach(ym=>{ h+=`<th>${ym.label}</th>`; });
  h += `<th>計</th></tr>`;

  const offices = office==='全オフィス' ? OFFICES : [office];
  for(const off of offices) {
    h += `<tr><td>${off}</td>`;
    let rowTotal = 0;
    FISCAL_MONTHS.forEach(ym=>{
      const k = costKey(off, ym);
      const v = costData[k] || '';
      rowTotal += parseFloat(String(v).replace(/,/g,'')) || 0;
      h += `<td><input type="text" inputmode="numeric" value="${v}" placeholder="0"
        data-office="${off}" data-year="${ym.year}" data-month="${ym.month}"
        oninput="onCostInput(this)" onfocus="this.select()"></td>`;
    });
    h += `<td id="cost-rowtotal-${off}" style="text-align:right;font-weight:600;padding:3px 8px;min-width:80px">${rowTotal>0?'¥'+Math.round(rowTotal).toLocaleString():'－'}</td>`;
    h += `</tr>`;
  }
  h += `</table></div></div></div>`;
  return h;
}

function toggleCost(office) {
  const toggle = document.getElementById(`cost-toggle-${office}`);
  const body = document.getElementById(`cost-body-${office}`);
  if(!toggle||!body) return;
  const isOpen = body.classList.toggle('open');
  toggle.textContent = (isOpen?'▼':'▶') + ' 集客費用を入力する（クリックで展開）';
  toggle.classList.toggle('open', isOpen);
}

let _costRenderTimer = null;
function onCostInput(el) {
  const off = el.dataset.office;
  const ym = {year:+el.dataset.year, month:+el.dataset.month};
  const val = parseFloat(el.value.replace(/,/g,''));
  setCost(off, ym, isNaN(val)?'':val);
  // 行合計を即時更新
  updateCostRowTotal(off);
  // データテーブルは400ms後に遅延更新（フォームは再生成しない）
  clearTimeout(_costRenderTimer);
  _costRenderTimer = setTimeout(() => {
    if(currentView==='office') {
      document.getElementById('tbl-office-wrap').innerHTML = renderOfficeTable(currentOffice);
    } else {
      document.getElementById('tbl-all-wrap').innerHTML = renderAllOfficeTable();
    }
  }, 400);
}

function updateCostRowTotal(office) {
  const offices = office==='全オフィス' ? OFFICES : [office];
  for(const off of offices) {
    let rowTotal = 0;
    FISCAL_MONTHS.forEach(ym => {
      const v = costData[costKey(off, ym)];
      rowTotal += parseFloat(String(v||'').replace(/,/g,'')) || 0;
    });
    const el = document.getElementById(`cost-rowtotal-${off}`);
    if(el) el.textContent = rowTotal > 0 ? '¥'+Math.round(rowTotal).toLocaleString() : '－';
  }
}

/* ═══════════════════════════════
   NAV & VIEW SWITCHING
═══════════════════════════════ */
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el = document.getElementById('page-'+page);
  if(el) el.classList.add('active');
  const nav = document.querySelector(`.nav-item[data-page="${page}"]`);
  if(nav) nav.classList.add('active');
}

function switchView(view) {
  currentView = view;
  document.getElementById('view-office').style.display = view==='office'?'':'none';
  document.getElementById('view-all').style.display = view==='all'?'':'none';
  document.getElementById('vbtn-office').classList.toggle('active', view==='office');
  document.getElementById('vbtn-all').classList.toggle('active', view==='all');
  render();
}

function switchOffice(off) {
  currentOffice = off;
  document.querySelectorAll('.office-tab').forEach(t=>t.classList.toggle('active', t.dataset.office===off));
  renderOfficeView();
}

/* ═══════════════════════════════
   OFFICE TABS BUILD
═══════════════════════════════ */
function buildOfficeTabs() {
  const container = document.getElementById('office-tabs');
  if(!container) return;
  const all = ['全オフィス',...OFFICES];
  container.innerHTML = all.map(off =>
    `<button class="office-tab${off===currentOffice?' active':''}" data-office="${off}" onclick="switchOffice('${off}')">${off}</button>`
  ).join('');
}

/* ═══════════════════════════════
   RENDER
═══════════════════════════════ */
function renderOfficeView() {
  document.getElementById('cost-office-wrap').innerHTML = renderCostInput(currentOffice);
  document.getElementById('tbl-office-wrap').innerHTML = renderOfficeTable(currentOffice);
}

function renderAllView() {
  document.getElementById('cost-all-wrap').innerHTML = renderCostInput('全オフィス');
  document.getElementById('tbl-all-wrap').innerHTML = renderAllOfficeTable();
}

function render() {
  buildOfficeTabs();
  if(currentView==='office') renderOfficeView();
  else renderAllView();
}

/* ═══════════════════════════════
   共有HTML出力
═══════════════════════════════ */
function exportSharedHtml() {
  if(!integratedRows.length || !mcgRows.length) {
    alert('CSVを読み込んでから出力してください');
    return;
  }

  const btn = document.getElementById('btn-export');
  btn.textContent = '⏳ 集計中...';
  btn.disabled = true;

  setTimeout(() => {
    try {
      // 全オフィス×全月の集計済みデータを生成
      const statsMatrix = {};
      OFFICES.forEach(off => {
        statsMatrix[off] = {};
        FISCAL_MONTHS.forEach(ym => {
          const s = computeStatsMCG(ym.year, ym.month, off);
          s.total = countTotal(ym.year, ym.month, off);
          s.cost = getCost(off, ym);
          statsMatrix[off][`${ym.year}-${ym.month}`] = s;
        });
      });

      // 更新日（昨日）
      const d = new Date();
      d.setDate(d.getDate() - 1);
      const updatedDate = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} OFF分`;

      const embedData = {
        version: '3ki',
        updatedDate,
        totalRows: integratedRows.length,
        mcgRows: mcgRows.length,
        costData,
        statsMatrix,
      };

      // 現在のHTMLにデータを埋め込む
      const currentHtml = document.documentElement.outerHTML;

      const embedScript = `<script>window._EMBEDDED_DATA = ${JSON.stringify(embedData)};<\/script>`;

      // </head>の直前に埋め込む
      const sharedHtml = currentHtml.replace('</head>', embedScript + '</head>');

      // ダウンロード
      const blob = new Blob([sharedHtml], {type:'text/html;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `hop_dashboard_3ki_shared.html`;
      a.click();
      URL.revokeObjectURL(url);

      btn.textContent = '✅ 出力完了！';
      btn.style.background = '#f0fdf4';
      btn.style.borderColor = '#16a34a';
      btn.style.color = '#15803d';
      setTimeout(() => {
        btn.textContent = '📤 共有HTML出力';
        btn.style.background = '#1c2135';
        btn.style.borderColor = '#1c2135';
        btn.style.color = '#fff';
        btn.disabled = false;
      }, 2500);
    } catch(e) {
      alert('出力エラー: ' + e.message);
      btn.textContent = '📤 共有HTML出力';
      btn.disabled = false;
    }
  }, 50);
}

/* ═══════════════════════════════
   埋め込みデータ読込（共有HTML用）
═══════════════════════════════ */
function loadEmbeddedData() {
  const d = window._EMBEDDED_DATA;
  if(!d || d.version !== '3ki') return false;

  // CSVアップロードボタンを非表示
  ['btn-integrated','btn-mcg','btn-export','inp-integrated','inp-mcg'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });

  // ヘッダー情報を表示
  const infoEl = document.getElementById('info-integrated');
  if(infoEl) { infoEl.textContent = `統合ツール: ${(d.totalRows||0).toLocaleString()}行`; infoEl.className = 'ok'; }
  const infoMcg = document.getElementById('info-mcg');
  if(infoMcg) { infoMcg.textContent = `MCG: ${(d.mcgRows||0).toLocaleString()}行`; infoMcg.className = 'ok'; }
  const infoMatch = document.getElementById('info-match');
  if(infoMatch) { infoMatch.style.display = ''; infoMatch.textContent = `更新日: ${d.updatedDate||''}`; infoMatch.className = 'ok'; }

  // 集客費を復元
  if(d.costData) Object.assign(costData, d.costData);

  // 集計済みデータをセット（computeStatsMCG/countTotalが自動で使う）
  if(d.statsMatrix) _embeddedMatrix = d.statsMatrix;

  return true;
}

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => switchPage(el.dataset.page));
});

loadCostFromStorage();

const isEmbedded = loadEmbeddedData();
buildOfficeTabs();

if(isEmbedded) {
  // 埋め込みデータがあればそのまま描画
  render();
} else {
  // 通常モード：CSV待機
  document.getElementById('tbl-office-wrap').innerHTML =
    `<div class="empty-state"><div class="icon">📂</div><p>統合ツールCSVとMCG CSVを読み込んでください</p><small>右上のボタンからCSVをアップロード</small></div>`;
}
</script>
